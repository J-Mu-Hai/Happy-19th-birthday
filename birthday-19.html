    function getWishWallMetrics(total) {
      const isMobile = window.innerWidth < 768;
      const density = clamp((total - 40) / 40, 0, 1);
      const baseRadius = isMobile ? 380 : 560;
      const compactRadius = isMobile ? 304 : 464;
      const baseVerticalScale = isMobile ? 0.88 : 0.92;
      const compactVerticalScale = isMobile ? 0.82 : 0.86;
      const baseCardWidth = isMobile ? 160 : 180;
      const compactCardWidth = isMobile ? 136 : 154;
      const baseCardHeight = isMobile ? 120 : 140;
      const compactCardHeight = isMobile ? 108 : 118;
      return {
        radius: baseRadius - ((baseRadius - compactRadius) * density),
        verticalScale: baseVerticalScale - ((baseVerticalScale - compactVerticalScale) * density),
        cardWidth: baseCardWidth - ((baseCardWidth - compactCardWidth) * density),
        cardHeight: baseCardHeight - ((baseCardHeight - compactCardHeight) * density)
      };
    }

    function createWishCard(friend, index, total) {
      const card = document.createElement('article');
      card.className = 'wish-card border border-white/15';
      const isEmptySlot = isFriendWishSlotEmpty(friend);
      card.setAttribute('role', 'button');
      card.setAttribute('tabindex', '0');
      card.setAttribute('aria-label', isEmptySlot ? '查看待填写卡片位置' : `查看 ${friend.name} 的完整祝福`);
      card.dataset.index = String(index);
      card.dataset.empty = isEmptySlot ? 'true' : 'false';

      // 为每个卡片生成不同的颜色主题
      const hue = (index * 360 / total) % 360;
      const colorTheme = `hsla(${hue}, 70%, 75%, 0.25)`;
      const borderColor = `hsla(${hue}, 60%, 80%, 0.4)`;
      card.dataset.baseHue = hue.toFixed(2);

      const metrics = getWishWallMetrics(total);
      card.style.setProperty('--card-width', `${metrics.cardWidth}px`);
      card.style.setProperty('--card-height', `${metrics.cardHeight}px`);
      if (isEmptySlot) {
        card.style.background = 'linear-gradient(135deg, rgba(255,255,255,0.06), rgba(255,255,255,0.03))';
        card.style.borderColor = 'rgba(255,255,255,0.12)';
        card.style.boxShadow = '0 12px 32px rgba(10, 10, 28, 0.18)';
        card.innerHTML = `
          <div class="wish-card-inner">
            <div class="text-center">
              <p class="text-base font-semibold text-white/52">待填写</p>
              <p class="mt-2 text-xs text-white/36 leading-relaxed">这个位置会优先被新的卡片内容补上</p>
            </div>
          </div>
        `;
      } else {
        card.style.background = `linear-gradient(135deg, ${colorTheme}, rgba(255,255,255,0.08))`;
        card.style.borderColor = borderColor;

        // 简化内容：只显示名字和简短祝福
        const shortText = friend.shortWish.replace(/\[|\]/g, '').slice(0, 20) + (friend.shortWish.length > 20 ? '...' : '');

        card.innerHTML = `
          <div class="wish-card-inner card-tilt">
            <div class="wish-card-sheen"></div>
            <div class="text-center">
              <h3 class="text-lg font-bold text-white truncate max-w-[140px]">${friend.name}</h3>
              <p class="mt-2 text-xs text-white/70 line-clamp-2 leading-relaxed">${shortText}</p>
            </div>
          </div>
        `;
      }

      // 斐波那契球面分布算法 - 均匀分布在球面上
      const phi = Math.acos(-1 + (2 * index) / total);
      const theta = Math.sqrt(total * Math.PI) * phi;
      
      const { radius, verticalScale } = metrics;
      
      // 计算3D坐标 - 确保在球面上均匀分布
      const x = radius * Math.sin(phi) * Math.cos(theta);
      const y = radius * Math.sin(phi) * Math.sin(theta) * verticalScale;
      const z = radius * Math.cos(phi);
      
      // 存储原始位置用于billboard效果
      card.dataset.originalX = x;
      card.dataset.originalY = y;
      card.dataset.originalZ = z;
      card.dataset.wallRadius = radius.toFixed(2);
      card.dataset.tiltZ = randomBetween(-6, 6).toFixed(2);
      
      // 初始位置设为中心点（用于进场动画）
      card.style.transform = `translate3d(0, 0, 0)`;
      
      return card;
    }

    function renderWishWall() {
      cardOrbit.innerHTML = '';
      const totalSlots = Math.max(60, friendWishesState.length);
      const metrics = getWishWallMetrics(totalSlots);
      cardOrbit.dataset.wallRadius = metrics.radius.toFixed(2);
      const cardsForRender = Array.from({ length: totalSlots }, (_, sourceIndex) => ({
        friend: friendWishesState[sourceIndex] || cloneFriendWish({}),
        sourceIndex
      }));

      cardsForRender.forEach(({ friend, sourceIndex }, index) => {
        const card = createWishCard(friend, index, cardsForRender.length || 1);
        card.dataset.sourceIndex = String(sourceIndex);
        cardOrbit.appendChild(card);
      });
      
      // 从中心炸开散开的进场动画
      const cards = cardOrbit.querySelectorAll('.wish-card');
      cards.forEach((card, index) => {
        const x = parseFloat(card.dataset.originalX);
        const y = parseFloat(card.dataset.originalY);
        const z = parseFloat(card.dataset.originalZ);
        
        // 使用GSAP实现炸开动画
        gsap.to(card, {
          duration: 1.2,
          delay: index * 0.03,
          ease: 'elastic.out(1, 0.6)',
          onUpdate: function() {
            const progress = this.progress();
            const currentX = x * progress;
            const currentY = y * progress;
            const currentZ = z * progress;
            const radius = parseFloat(card.dataset.wallRadius || cardOrbit.dataset.wallRadius || String(metrics.radius));
            const depthProgress = (currentZ + radius) / (radius * 2);
            const scale = 0.72 + depthProgress * 0.42;
            const opacity = 0.34 + depthProgress * 0.66;
            card.style.opacity = `${opacity}`;
            card.style.zIndex = `${Math.round(depthProgress * 1000)}`;
            card.style.filter = 'none';
            if (card.dataset.empty !== 'true') {
              const hue = parseFloat(card.dataset.baseHue || '0');
              const frontLight = 66 + (depthProgress * 10);
              const backLight = 20 + (depthProgress * 14);
              const accentHue = (hue + 36) % 360;
              card.style.background = `linear-gradient(145deg, hsla(${hue}, 68%, ${frontLight}%, 0.34), hsla(${accentHue}, 60%, ${backLight}%, 0.18))`;
              card.style.borderColor = `hsla(${hue}, 58%, ${72 + (depthProgress * 10)}%, 0.42)`;
            }
            card.style.transform = `translate3d(${currentX}px, ${currentY}px, ${currentZ}px) scale(${scale})`;
          },
          onComplete: function() {
            // 动画完成后，设置为球面坐标位置，并添加billboard效果
            const billboardRotateX = -rotationState.currentX;
            const billboardRotateY = -rotationState.currentY;
            const tiltZ = parseFloat(card.dataset.tiltZ) || 0;
            const radius = parseFloat(card.dataset.wallRadius || cardOrbit.dataset.wallRadius || String(metrics.radius));
            const depthProgress = (z + radius) / (radius * 2);
            const scale = 0.72 + depthProgress * 0.42;
            const opacity = 0.34 + depthProgress * 0.66;
            card.style.opacity = `${opacity}`;
            card.style.zIndex = `${Math.round(depthProgress * 1000)}`;
            card.style.filter = 'none';
            card.style.transform = `translate3d(${x}px, ${y}px, ${z}px) scale(${scale}) rotateX(${billboardRotateX}deg) rotateY(${billboardRotateY}deg) rotateZ(${tiltZ}deg)`;
          }
        });
      });
    }

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function getScenePanBounds(scale = rotationState.targetScale) {
      const rect = sceneWrap.getBoundingClientRect();
      const safeScale = Math.max(0.3, scale);
      const overflowX = Math.max(0, ((rect.width * safeScale) - rect.width) / 2);
      const overflowY = Math.max(0, ((rect.height * safeScale) - rect.height) / 2);
      const extraX = Math.min(rect.width * 0.18, 220);
      const extraY = Math.min(rect.height * 0.22, 220);
      return {
        minX: -(overflowX + extraX),
        maxX: overflowX + extraX,
        minY: -(overflowY + extraY),
        maxY: overflowY + extraY
      };
    }

    function clampScenePanTargets() {
      const bounds = getScenePanBounds(rotationState.targetScale);
      rotationState.targetPanX = clamp(rotationState.targetPanX, bounds.minX, bounds.maxX);
      rotationState.targetPanY = clamp(rotationState.targetPanY, bounds.minY, bounds.maxY);
      rotationState.panX = clamp(rotationState.panX, bounds.minX, bounds.maxX);
      rotationState.panY = clamp(rotationState.panY, bounds.minY, bounds.maxY);
    }

    function updateSceneWrapTransform() {
      clampScenePanTargets();
      sceneWrap.style.transformOrigin = '50% 50%';
      sceneWrap.style.transform = `translate3d(${rotationState.panX}px, ${rotationState.panY}px, 0) scale(${rotationState.scale})`;
    }

    function cloneFriendWish(entry) {
      return {
        name: entry?.name || '',
        tag: entry?.tag || '',
        accent: entry?.accent || '生日祝福',
        shortWish: entry?.shortWish || '',
        fullWish: entry?.fullWish || ''
      };
    }

    function isPlaceholderValue(value) {
      return !String(value || '').trim() || /^\[[^\]]+\]$/.test(String(value || '').trim());
    }

    function isFriendWishSlotEmpty(entry) {
      if (!entry) return true;
      return isPlaceholderValue(entry.name) || isPlaceholderValue(entry.shortWish) || isPlaceholderValue(entry.fullWish);
    }

    function getLocalFriendWishes() {
      try {
        const raw = window.localStorage.getItem(LOCAL_FRIEND_WISHES_KEY);
        const parsed = JSON.parse(raw || '[]');
        return Array.isArray(parsed) ? parsed.map(cloneFriendWish) : [];
      } catch (error) {
        return [];
      }
    }

    function setLocalFriendWishes(entries) {
      try {
        const normalized = Array.isArray(entries) ? entries.map(cloneFriendWish) : [];
        window.localStorage.setItem(LOCAL_FRIEND_WISHES_KEY, JSON.stringify(normalized));
      } catch (error) {
        // Ignore local storage failures.
      }
    }

    function mergeFriendWishes(...groups) {
      const merged = [];
      const seen = new Set();

      groups.flat().forEach((entry) => {
        const next = cloneFriendWish(entry);
        const key = JSON.stringify([
          next.name,
          next.tag,
          next.accent,
          next.shortWish,
          next.fullWish
        ]);

        if (seen.has(key)) return;
        seen.add(key);
        merged.push(next);
      });

      return merged;
    }

    function getApiBase() {
      return window.location.protocol === 'file:' ? ASK_ME_API_BASE : '';
    }

    async function loadFriendWishes() {
      const base = INITIAL_FRIEND_WISHES.map(cloneFriendWish);
      const localCards = getLocalFriendWishes();
      try {
        const response = await fetch(`${getApiBase()}/api/cards`, {
          method: 'GET'
        });
        if (!response.ok) return mergeFriendWishes(base, localCards);
        const data = await response.json();
        const cards = Array.isArray(data?.cards) ? data.cards : [];
        return mergeFriendWishes(base, cards, localCards);
      } catch (error) {
        return mergeFriendWishes(base, localCards);
      }
    }

    async function saveFriendWish(entry) {
      try {
        const response = await fetch(`${getApiBase()}/api/cards`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(entry)
        });

        if (!response.ok) {
          const data = await response.json().catch(() => ({}));
          throw new Error(data?.error || `save cards failed: ${response.status}`);
        }

        const data = await response.json();
        const cards = Array.isArray(data?.cards) ? data.cards : [];
        return {
          cards: mergeFriendWishes(INITIAL_FRIEND_WISHES, cards, getLocalFriendWishes()),
          storage: data?.storage || 'cloud'
        };
      } catch (error) {
        const localCards = mergeFriendWishes(getLocalFriendWishes(), [entry]);
        setLocalFriendWishes(localCards);
        return {
          cards: mergeFriendWishes(INITIAL_FRIEND_WISHES, localCards),
          storage: 'local',
          errorMessage: error?.message || 'cloud save failed'
        };
      }
    }

    function normalizeCardSubmission() {
      const name = cardFormName.value.trim();
      const tag = cardFormTag.value.trim();
      const shortWish = cardFormShortWish.value.trim();
      const fullWish = cardFormFullWish.value.trim();
      const accent = tag || '在线寄语';

      return { name, tag, accent, shortWish, fullWish };
    }

    function replaceFriendWishes(entries) {
      friendWishesState = Array.isArray(entries) ? entries.map(cloneFriendWish) : [];
      renderWishWall();
    }

    function animateOrbit() {
      if (!rotationState.isDragging) {
        rotationState.baseY += rotationState.autoRotate * 2.8;
        rotationState.targetY += (rotationState.baseY - rotationState.targetY) * 0.08;
        rotationState.targetX += ((-8) - rotationState.targetX) * 0.08;
      }
      rotationState.targetX = clamp(rotationState.targetX, -24, 24);
      rotationState.velocityX += (rotationState.targetX - rotationState.currentX) * 0.08;
      rotationState.velocityY += (rotationState.targetY - rotationState.currentY) * 0.08;
      rotationState.velocityX *= 0.86;
      rotationState.velocityY *= 0.90;
      rotationState.currentX += rotationState.velocityX;
      rotationState.currentY += rotationState.velocityY;
      rotationState.currentX = clamp(rotationState.currentX, -24, 24);
      
      // 缩放平滑过渡
      rotationState.scale += (rotationState.targetScale - rotationState.scale) * 0.1;
      rotationState.panX += (rotationState.targetPanX - rotationState.panX) * 0.12;
      rotationState.panY += (rotationState.targetPanY - rotationState.panY) * 0.12;
      updateSceneWrapTransform();
      
      // 旋转整个球体
      cardOrbit.style.transform = `rotateX(${rotationState.currentX}deg) rotateY(${rotationState.currentY}deg)`;
      
      // Billboard效果：每个卡片始终正对用户
      const cards = cardOrbit.querySelectorAll('.wish-card');
      cards.forEach((card) => {
        // 获取卡片的原始位置
        const x = parseFloat(card.dataset.originalX) || 0;
        const y = parseFloat(card.dataset.originalY) || 0;
        const z = parseFloat(card.dataset.originalZ) || 0;
        
        // 反向旋转，使卡片始终面对用户
        const billboardRotateX = -rotationState.currentX;
        const billboardRotateY = -rotationState.currentY;
        
        const tiltZ = parseFloat(card.dataset.tiltZ) || 0;
        
        const radius = parseFloat(card.dataset.wallRadius || cardOrbit.dataset.wallRadius || String(getWishWallMetrics(cardOrbit.children.length || 1).radius));
        const depthProgress = (z + radius) / (radius * 2);
        const scale = 0.72 + depthProgress * 0.42;
        const opacity = 0.34 + depthProgress * 0.66;
        card.style.zIndex = `${Math.round(depthProgress * 1000)}`;
        if (card.dataset.empty !== 'true') {
          const hue = parseFloat(card.dataset.baseHue || '0');
          const accentHue = (hue + 42) % 360;
          const frontLight = 64 + (depthProgress * 14);
          const rearLight = 18 + (depthProgress * 18);
          const edgeLight = 72 + (depthProgress * 10);
          card.style.background = `linear-gradient(145deg, hsla(${hue}, 70%, ${frontLight}%, 0.36), hsla(${accentHue}, 62%, ${rearLight}%, 0.18))`;
          card.style.borderColor = `hsla(${hue}, 60%, ${edgeLight}%, 0.46)`;
          card.style.boxShadow = `0 14px 34px rgba(10, 10, 28, ${0.16 + (depthProgress * 0.16)}), 0 0 18px hsla(${hue}, 70%, 72%, ${0.08 + (depthProgress * 0.06)})`;
        }
        card.style.zIndex = `${Math.round(depthProgress * 1000)}`;
        card.style.opacity = `${opacity}`;
        card.style.filter = 'none';
        
        // 应用3D位置、billboard效果和轻微固定倾斜
        card.style.transform = `translate3d(${x}px, ${y}px, ${z}px) scale(${scale}) rotateX(${billboardRotateX}deg) rotateY(${billboardRotateY}deg) rotateZ(${tiltZ}deg)`;
      });
      
      requestAnimationFrame(animateOrbit);
    }

    function pointerPosition(event) {
      if (event.touches && event.touches[0]) {
        return { x: event.touches[0].clientX, y: event.touches[0].clientY };
      }
      return { x: event.clientX, y: event.clientY };
    }

    function onPointerDown(event) {
      rotationState.pointerDown = true;
      rotationState.isDragging = false;
      rotationState.dragMoved = false;
      const pressedCard = event.target?.closest ? event.target.closest('.wish-card') : null;
      rotationState.pressedCardIndex = pressedCard
        ? Number(pressedCard.dataset.sourceIndex ?? pressedCard.dataset.index)
        : null;
      rotationState.lastPointerTime = performance.now();
      const pos = pointerPosition(event);
      rotationState.pressStartX = pos.x;
      rotationState.pressStartY = pos.y;
      rotationState.lastX = pos.x;
      rotationState.lastY = pos.y;
    }

    function onPointerMove(event) {
      const pos = pointerPosition(event);
      rotationState.lastPointerTime = performance.now();
      if (!rotationState.pointerDown && !rotationState.isDragging) return;

      const totalDeltaX = pos.x - rotationState.pressStartX;
      const totalDeltaY = pos.y - rotationState.pressStartY;
      const totalDistance = Math.hypot(totalDeltaX, totalDeltaY);

      if (!rotationState.isDragging) {
        if (totalDistance < 6) {
          return;
        }
        rotationState.isDragging = true;
        rotationState.dragMoved = true;
      }

      const deltaX = pos.x - rotationState.lastX;
      const deltaY = pos.y - rotationState.lastY;

      // 更流畅的拖拽体验
      rotationState.targetY += deltaX * 0.3;
      rotationState.targetX -= deltaY * 0.2;
      rotationState.targetX = clamp(rotationState.targetX, -24, 24);
      rotationState.baseY = rotationState.targetY;
      rotationState.lastX = pos.x;
      rotationState.lastY = pos.y;
    }

    function onPointerUp() {
      const shouldOpenPressedCard = rotationState.pointerDown && !rotationState.dragMoved && rotationState.pressedCardIndex !== null;
      rotationState.pointerDown = false;
      rotationState.baseY = rotationState.targetY;
      const pressedCardIndex = rotationState.pressedCardIndex;
      rotationState.pressedCardIndex = null;
      if (shouldOpenPressedCard) {
        openWishModal(pressedCardIndex);
      }
      window.setTimeout(() => {
        rotationState.isDragging = false;
        rotationState.dragMoved = false;
      }, 30);
    }

    function onWheel(event) {
      event.preventDefault();
      const rect = sceneWrap.getBoundingClientRect();
      const pointerX = event.clientX - rect.left - (rect.width / 2);
      const pointerY = event.clientY - rect.top - (rect.height / 2);
      const previousScale = rotationState.targetScale;
      const delta = event.deltaY > 0 ? -0.1 : 0.1;
      const nextScale = Math.max(0.3, Math.min(2.0, rotationState.targetScale + delta));
      const scaleRatio = nextScale / previousScale;
      rotationState.targetScale = nextScale;
      rotationState.targetPanX = pointerX - scaleRatio * (pointerX - rotationState.targetPanX);
      rotationState.targetPanY = pointerY - scaleRatio * (pointerY - rotationState.targetPanY);
      clampScenePanTargets();
      updateSceneWrapTransform();
      updateWallFragmentVisibility();
    }

    function bindCardTilt() {
      cardOrbit.addEventListener('mousemove', (event) => {
        if (!rotationState.isDragging) return;
        const target = event.target.closest('.wish-card');
        cardOrbit.querySelectorAll('.wish-card').forEach((card) => {
          if (card !== target) {
            card.style.scale = '1';
            const tiltInner = card.querySelector('.card-tilt');
            if (tiltInner) tiltInner.style.transform = 'translateZ(0px) rotateX(0deg) rotateY(0deg)';
          }
        });

        if (!target) return;
        const rect = target.getBoundingClientRect();
        const offsetX = event.clientX - rect.left;
        const offsetY = event.clientY - rect.top;
        const rotateY = ((offsetX / rect.width) - 0.5) * 10;
        const rotateX = ((offsetY / rect.height) - 0.5) * -10;
        target.style.scale = '1.04';
        target.querySelector('.card-tilt').style.transform = `translateZ(26px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
      });

      cardOrbit.addEventListener('mouseleave', () => {
        cardOrbit.querySelectorAll('.wish-card').forEach((card) => {
          card.style.scale = '1';
          const tiltInner = card.querySelector('.card-tilt');
          if (tiltInner) tiltInner.style.transform = 'translateZ(0px) rotateX(0deg) rotateY(0deg)';
        });
      });
    }

    function openWishModal(index) {
      const friend = friendWishesState[index];
      if (!friend) return;
      const isEmptySlot = isFriendWishSlotEmpty(friend);
      modalMonogram.textContent = isEmptySlot
        ? '空位'
        : (friend.name || '?').replace(/\[|\]/g, '').trim().slice(0, 2).toUpperCase() || '19';
      modalName.textContent = isEmptySlot ? '待填写卡片位置' : friend.name;
      modalTag.textContent = isEmptySlot ? '这个位置还在等待新的祝福' : '我的回应';
      modalMessage.textContent = isEmptySlot
        ? '这里现在还是空的。\n\n你可以点击右下角的“在线填写卡片”，把新的名字、祝福和完整内容填进来。系统会优先按空缺顺序补上这个位置。'
        : friend.fullWish;
      modalPreviewAccent.textContent = isEmptySlot ? '等待被写下的祝福' : 'TA 给予我的祝福';
      modalPreviewShort.textContent = isEmptySlot
        ? '这一张卡片正在等你填写。'
        : friend.shortWish;
      modalPreviewCard.style.background = 'linear-gradient(135deg, rgba(255, 200, 215, 0.16), rgba(201, 182, 255, 0.12), rgba(246, 225, 164, 0.08))';

      wishModal.classList.remove('hidden');
      wishModal.classList.add('flex');
      wishModal.classList.remove('pointer-events-none');

      gsap.fromTo(
        '.modal-panel',
        { y: 30, opacity: 0, scale: 0.96 },
        { y: 0, opacity: 1, scale: 1, duration: 0.45, ease: 'power3.out' }
      );
    }

    function closeWishModal() {
      gsap.to('.modal-panel', {
        y: 20,
        opacity: 0,
        scale: 0.98,
        duration: 0.25,
        ease: 'power2.in',
        onComplete: () => {
          wishModal.classList.add('hidden');
          wishModal.classList.remove('flex');
          wishModal.classList.add('pointer-events-none');
        }
      });
    }

    function bindEvents() {
      startButton.addEventListener('click', enterMemory);
      closeEndingButton.addEventListener('click', hideEndingOverlay);
      wallAudio.addEventListener('ended', showEndingOverlay);
      backToWelcomeFromWallButton.addEventListener('click', returnToWelcome);
      openCardFormButton.addEventListener('click', openCardFormModal);
      enterAskButton.addEventListener('click', enterAskPage);
      backToWallButton.addEventListener('click', returnToWallFromAsk);
      welcomeAudioToggle.addEventListener('click', toggleIntroAudio);
      memoryAudioToggle.addEventListener('click', toggleIntroAudio);
      wallAudioToggle.addEventListener('click', toggleWallAudio);
      askAudioToggle.addEventListener('click', toggleWallAudio);

      sceneWrap.addEventListener('mousedown', onPointerDown);
      sceneWrap.addEventListener('mousemove', onPointerMove);
      window.addEventListener('mouseup', onPointerUp);
      sceneWrap.addEventListener('touchstart', onPointerDown, { passive: true });
      sceneWrap.addEventListener('touchmove', onPointerMove, { passive: true });
      window.addEventListener('touchend', onPointerUp, { passive: true });
      sceneWrap.addEventListener('wheel', onWheel, { passive: false });
      memoryPage.addEventListener('wheel', accelerateMemorySequence, { passive: false });

      cardOrbit.addEventListener('keydown', (event) => {
        const card = event.target.closest('.wish-card');
        if (!card) return;
        if (card.dataset.empty === 'true') return;
        if (event.key === 'Enter' || event.key === ' ') {
          event.preventDefault();
          openWishModal(Number(card.dataset.sourceIndex ?? card.dataset.index));
        }
      });

      modalBackdrop.addEventListener('click', closeWishModal);
      closeModalButton.addEventListener('click', closeWishModal);
      cardFormBackdrop.addEventListener('click', () => closeCardFormModal(true));
      closeCardFormButton.addEventListener('click', () => closeCardFormModal(true));
      cardForm.addEventListener('submit', handleCardFormSubmit);
      askForm.addEventListener('submit', async (event) => {
        event.preventDefault();
        const message = askInput.value.trim();
        if (!message) return;

        appendAskMessage('user', message);
        askInput.value = '';

        try {
          const result = await fetchAskReply(message);
          appendAskMessage('ai', result.answer || '我正在想这件事。', result.references || []);
        } catch (error) {
          appendAskMessage('ai', error.message || 'Ask Me 暂时没有成功回答。');
        }
      });

      document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape') {
          if (!wishModal.classList.contains('hidden')) {
            closeWishModal();
            return;
          }
          if (!cardFormModal.classList.contains('hidden')) {
            closeCardFormModal(true);
            return;
          }
          if (currentStage === 'ask') {
            returnToWallFromAsk();
            return;
          }
          if (currentStage === 'memory') {
            returnToWelcome();
          }
        }

        if (event.code === 'Space' && currentStage === 'memory') {
          event.preventDefault();
          enterWall();
        }
      });

      window.addEventListener('resize', () => {
        rotationState.autoRotate = window.innerWidth < 768 ? 0.09 : 0.16;
        rotationState.panX = 0;
        rotationState.panY = 0;
        rotationState.targetPanX = 0;
        rotationState.targetPanY = 0;
        updateSceneWrapTransform();
        createWallParticles();
        createMemoryAmbientParticles();
        renderWishWall();
        updateWallFragmentVisibility();
      });

      document.addEventListener('pointerdown', resumeAudioAfterGesture, { passive: true });
      document.addEventListener('keydown', resumeAudioAfterGesture);
      document.addEventListener('touchstart', resumeAudioAfterGesture, { passive: true });
    }

    function openCardFormModal() {
      if (!cardFormModal) return;
      cardFormStatus.textContent = '填写后会提交到共享卡片墙，其他人刷新页面后也能看到。';
      cardFormModal.classList.remove('hidden');
      cardFormModal.classList.add('flex');
      cardFormModal.classList.remove('pointer-events-none');
      setTimeout(() => cardFormName.focus(), 60);

      gsap.fromTo(
        '#cardFormModal .modal-panel',
        { y: 28, opacity: 0, scale: 0.97 },
        { y: 0, opacity: 1, scale: 1, duration: 0.4, ease: 'power3.out' }
      );
    }

    function closeCardFormModal(resetForm = false) {
      if (!cardFormModal || cardFormModal.classList.contains('hidden')) return;
      gsap.to('#cardFormModal .modal-panel', {
        y: 18,
        opacity: 0,
        scale: 0.98,
        duration: 0.22,
        ease: 'power2.in',
        onComplete: () => {
          cardFormModal.classList.add('hidden');
          cardFormModal.classList.remove('flex');
          cardFormModal.classList.add('pointer-events-none');
          if (resetForm && cardForm) cardForm.reset();
        }
      });
    }

    async function handleCardFormSubmit(event) {
      event.preventDefault();
      const entry = normalizeCardSubmission();
      if (!entry.name || !entry.shortWish || !entry.fullWish) {
        cardFormStatus.textContent = '名字、正面祝福和完整内容都要填写。';
        return;
      }

      cardFormStatus.textContent = '正在提交到共享卡片墙...';

      try {
        const result = await saveFriendWish(entry);
        replaceFriendWishes(result.cards);
        cardFormStatus.textContent = result.storage === 'cloud'
          ? '卡片已保存到共享卡片墙，其他人刷新页面后也能看到。'
          : `云端保存失败，本次已先保存在当前浏览器。原因：${result.errorMessage || '未知错误'}`;
        closeCardFormModal(true);
      } catch (error) {
        cardFormStatus.textContent = '提交失败，请稍后再试。';
      }
    }

    function initEntranceAnimation() {
      gsap.set(['.welcome-kicker', '.welcome-title', '.welcome-subtitle', '.welcome-cta'], {
        opacity: 0,
        y: 18
      });

      const introTimeline = gsap.timeline({
        defaults: { ease: 'power2.out' }
      });

      introTimeline
        .fromTo(
          '.welcome-hero-media',
          { scale: 1.18, opacity: 0.62 },
          { scale: 1.06, opacity: 1, duration: 2.6 }
        )
        .fromTo(
          '.welcome-hero-overlay',
          { opacity: 0.36 },
          { opacity: 1, duration: 2.2 },
          0
        )
        .fromTo(
          '.welcome-hero-glow',
          { opacity: 0.18, scale: 0.94 },
          { opacity: 1, scale: 1, duration: 2.4 },
          0.1
        )
        .to({}, { duration: 1.0 })
        .to(
          '.welcome-kicker',
          { opacity: 1, y: 0, duration: 0.7, ease: 'power3.out' }
        )
        .to(
          '.welcome-title',
          { opacity: 1, y: 0, duration: 0.85, ease: 'power3.out' },
          '-=0.35'
        )
        .to(
          '.welcome-subtitle',
          { opacity: 1, y: 0, duration: 0.8, ease: 'power3.out' },
          '-=0.35'
        )
        .to(
          '.welcome-cta',
          { opacity: 1, y: 0, duration: 0.75, ease: 'power3.out' },
          '-=0.28'
        );
    }

    let hasInitialized = false;

    async function init() {
      if (hasInitialized) return;
      hasInitialized = true;

      try {
        friendWishesState = await loadFriendWishes();
        document.documentElement.style.setProperty('--hero-image', 'url("/assets/images/welcome-hero.png")');
        document.documentElement.style.setProperty('--wall-image', 'url("/assets/images/wall-hero.png")');
        endingText.textContent = ENDING_MESSAGE;
        updateAudioToggleLabels();
        initParticles();
        createWelcomeParticles();
        createWallParticles();
        createMemoryAmbientParticles();
        renderAskSuggestions();
        appendAskMessage('ai', '你好呀，这里是 Ask Me。你可以问我关于19岁、成长、回忆、未来，或者任何你想知道的小问题。');
        renderWishWall();
        bindCardTilt();
        bindEvents();
        updateSceneWrapTransform();
        animateOrbit();
        initEntranceAnimation();
        if (welcomeTitle) welcomeTitle.textContent = WELCOME_TITLE_DEFAULT;
        if (welcomeSubtitle) welcomeSubtitle.textContent = WELCOME_SUBTITLE_DEFAULT;
        scheduleWelcomeEasterEgg();
        playWelcomeAudio();
        syncAudioPlayback();
      } catch (error) {
        console.error('Page init failed:', error);
      } finally {
        window.setTimeout(() => {
          body.classList.add('ready');
        }, 1200);
      }
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init, { once: true });
    } else {
      init();
    }

    window.addEventListener('load', init, { once: true });
    window.setTimeout(init, 2500);
  </script>
</body>
</html>
