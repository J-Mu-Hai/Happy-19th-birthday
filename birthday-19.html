<!DOCTYPE html>
<html lang="zh-CN">
<head>

  <title>致最好的19岁</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
  <script>
    if (window.tailwind) {
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif']
            },
            colors: {
              peach: '#ffb3c7',
              lavender: '#c9b6ff',
              goldSoft: '#f6e1a4',
              mist: '#f5f7fb'
            },
            boxShadow: {
              glow: '0 20px 60px rgba(255, 179, 199, 0.28)',
              card: '0 18px 50px rgba(19, 18, 46, 0.35)'
            },
            backgroundImage: {
              aurora:
                'radial-gradient(circle at 20% 20%, rgba(255, 194, 214, 0.30), transparent 30%), radial-gradient(circle at 80% 0%, rgba(201, 182, 255, 0.26), transparent 28%), radial-gradient(circle at 50% 80%, rgba(246, 225, 164, 0.18), transparent 30%), linear-gradient(135deg, #261b4b 0%, #5b3f72 40%, #8f6386 70%, #f09ab0 100%)'
            }
          }
        }
      };
    }

    if (!window.gsap) {
      const createTimeline = () => ({
        to() { return this; },
        fromTo() { return this; },
        set() { return this; }
      });

      window.gsap = {
        to(target, vars = {}) {
          if (typeof vars.onComplete === 'function') {
            window.setTimeout(vars.onComplete, 0);
          }
          return createTimeline();
        },
        fromTo(target, fromVars = {}, toVars = {}) {
          if (typeof toVars.onComplete === 'function') {
            window.setTimeout(toVars.onComplete, 0);
          }
          return createTimeline();
        },
        set() {
          return createTimeline();
        },
        timeline(config = {}) {
          if (typeof config.onStart === 'function') {
            window.setTimeout(config.onStart, 0);
          }
          if (typeof config.onComplete === 'function') {
            window.setTimeout(config.onComplete, 0);
          }
          return createTimeline();
        }
      };
    }

    if (!window.particlesJS) {
      window.particlesJS = function particlesFallback() {};
    }
  </script>

      transform: translateY(0);
      filter: blur(0);
      text-shadow: 0 10px 40px rgba(255, 220, 212, 0.2);
    }

    .memory-line-enter {

      overflow: hidden;
    }

    .memory-line-enter::after {

      left: 0;
      right: 0;
      bottom: -8px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(246, 225, 164, 0.68), transparent);
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    .memory-line.current.memory-line-enter::after {
      opacity: 1;
    }

    .memory-meta {
      position: relative;
      z-index: 2;
    }

    .memory-counter {
      font-variant-numeric: tabular-nums;
    }

    .memory-stage.memory-finale::before {

      animation-duration: 42s;
    }

    .memory-stage.memory-finale::after {

        radial-gradient(circle at 50% 46%, rgba(255, 218, 198, 0.05), transparent 18%),

      width: min(100%, 940px);
      height: min(58vh, 620px);
      padding: 40px 18px 56px;

      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      scroll-behavior: smooth;
      scrollbar-width: thin;
      scrollbar-color: rgba(255, 228, 212, 0.38) transparent;
    }

    .memory-lyrics-scene::-webkit-scrollbar {
      width: 8px;
    }

      position: relative;
      width: min(100%, 760px);
      margin: 0;

      line-height: 1.9;
      letter-spacing: 0.03em;

      50% { opacity: 1; transform: scale(1.03); }
    }

      100% { transform: scale(1.18) translate3d(1.4%, -1%, 0); }
    }

    @keyframes memoryColorBreath {
      0%, 100% {
        opacity: 1;
        filter: hue-rotate(0deg) saturate(1);
      }
      50% {
        opacity: 0.92;
        filter: hue-rotate(-8deg) saturate(1.08);
      }

      0%, 100% { transform: translateX(-50%) translateY(0); opacity: 0.84; }
      50% { transform: translateX(-50%) translateY(12px); opacity: 1; }
    }

    @keyframes memoryAirFloat {
      0% {
        transform: translate3d(0, 0, 0) scale(0.92);
        opacity: 0.06;
      }
      50% {
        opacity: 0.18;
      }
      100% {
        transform: translate3d(var(--air-x, 20px), var(--air-y, -30px), 0) scale(1.08);
        opacity: 0.08;
      }
    }

    @keyframes memoryLineSweep {
      0% {
        transform: translateX(0%);
        opacity: 0;
      }
      20% {
        opacity: 0.85;
      }
      80% {
        opacity: 0.56;
      }
      100% {
        transform: translateX(460%);
        opacity: 0;
      }
    }

    @keyframes memoryDustFall {
      0% { transform: translate3d(0, 0, 0) scale(0.72); opacity: 0; }
      12% { opacity: 0.72; }
      100% { transform: translate3d(var(--dust-x, 0px), var(--dust-y, 110vh), 0) scale(1.12); opacity: 0; }
    }

    .line-clamp-4 {
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    @keyframes blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0.2; }
    }

    .scene-wrap {
      width: min(100%, 1320px);
      height: min(86vh, 920px);
      perspective: 2200px;
      perspective-origin: center center;
      position: relative;
      z-index: 4;
      user-select: none;
      touch-action: none;
    }

    .card-orbit {
      position: absolute;
      inset: 0;
      transform-style: preserve-3d;
      will-change: transform;
    }

    .wish-card {
      position: absolute;
      top: 50%;
      left: 50%;
      width: min(var(--card-width), 64vw);
      height: min(var(--card-height), 54vh);
      margin-left: calc(var(--card-width) / -2);
      margin-top: calc(var(--card-height) / -2);
      border-radius: 28px;
      transform-style: preserve-3d;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      will-change: transform, opacity;
      contain: layout paint style;
      cursor: pointer;
      transition: transform 0.35s var(--transition-smooth), box-shadow 0.35s ease, border-color 0.35s ease;
      box-shadow: 0 18px 50px rgba(14, 13, 36, 0.35);
      overflow: hidden;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.14), rgba(255, 255, 255, 0.06));
      border: 1px solid rgba(255, 255, 255, 0.18);
    }

    .wish-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.16), rgba(255, 255, 255, 0.03));
      pointer-events: none;
    }

    .wish-card:hover {
      box-shadow: 0 28px 70px rgba(255, 179, 199, 0.18);
      border-color: rgba(255, 255, 255, 0.32);
    }

    .wish-card-inner {
      position: relative;
      z-index: 1;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 12px 16px;
      background:
        radial-gradient(circle at top right, rgba(246, 225, 164, 0.16), transparent 26%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.05));
    }

    .wish-card-sheen {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(140deg, rgba(255, 255, 255, 0.16), transparent 32%, transparent 68%, rgba(255, 255, 255, 0.08));
      pointer-events: none;
    }

    .wish-card-orb {
      width: 84px;
      height: 84px;
      border-radius: 24px;
      display: grid;
      place-items: center;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 0.06em;
      color: rgba(255, 255, 255, 0.92);
      background: linear-gradient(135deg, rgba(255, 200, 215, 0.30), rgba(201, 182, 255, 0.25), rgba(246, 225, 164, 0.18));
      border: 1px solid rgba(255, 255, 255, 0.18);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.18);
    }

    .wish-card-accent {
      height: 1px;
      width: 72px;
      background: linear-gradient(90deg, rgba(255,255,255,0), rgba(246,225,164,0.85), rgba(255,255,255,0));
    }

    .avatar-ring {
      width: 68px;
      height: 68px;
      border-radius: 999px;
      padding: 2px;
      background: linear-gradient(135deg, rgba(255, 179, 199, 1), rgba(201, 182, 255, 1), rgba(246, 225, 164, 1));
      flex-shrink: 0;
    }

    .avatar-ring img {
      width: 100%;
      height: 100%;
      border-radius: 999px;
      object-fit: cover;
      display: block;
      border: 2px solid rgba(14, 14, 36, 0.34);
    }

    .card-tilt,
    .card-floating {
      transform-style: preserve-3d;
    }

    .card-floating {
      animation: cardFloat 6s ease-in-out infinite;
    }

    @keyframes cardFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .modal-backdrop {
      background: rgba(7, 6, 21, 0.70);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .modal-panel {
      max-height: min(86vh, 920px);
      overflow: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(255, 255, 255, 0.35) transparent;
    }

    .modal-panel::-webkit-scrollbar {
      width: 8px;
    }

    .modal-panel::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.28);
      border-radius: 999px;
    }

    .ending-overlay {
      background: rgba(8, 7, 24, 0.76);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .ending-panel {
      background:
        radial-gradient(circle at top, rgba(255, 214, 194, 0.14), transparent 28%),
        linear-gradient(180deg, rgba(255,255,255,0.12), rgba(255,255,255,0.06));
    }

    #loader {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 18px;
      background:
        radial-gradient(circle at 30% 30%, rgba(255, 194, 214, 0.24), transparent 25%),
        radial-gradient(circle at 70% 20%, rgba(201, 182, 255, 0.18), transparent 25%),
        linear-gradient(135deg, #181234 0%, #35244f 50%, #8f5d7f 100%);
      transition: opacity 0.8s ease, transform 0.8s ease;
    }

    .loader-orb {
      width: 82px;
      height: 82px;
      border-radius: 999px;
      border: 2px solid rgba(255, 255, 255, 0.18);
      border-top-color: rgba(246, 225, 164, 1);
      border-right-color: rgba(255, 179, 199, 1);
      animation: loaderSpin 1.4s linear infinite;
      box-shadow: 0 0 36px rgba(255, 179, 199, 0.24);
    }

    @keyframes loaderSpin {
      to { transform: rotate(360deg); }
    }

    .floating-fragments {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 3;
    }

    .floating-fragment {
      position: absolute;
      max-width: min(34vw, 360px);
      padding: 14px 18px;
      border-radius: 22px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: linear-gradient(180deg, rgba(18, 18, 42, 0.78), rgba(255, 255, 255, 0.08));
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow: 0 16px 45px rgba(6, 8, 28, 0.32);
      color: rgba(255, 255, 255, 0.88);
      font-size: 13px;
      line-height: 1.75;
      letter-spacing: 0.01em;
      white-space: pre-wrap;
    }

    .floating-fragment.wall-fragment {
      max-width: min(54vw, 720px);
      padding: 0;
      border: 0;
      border-radius: 0;
      background: transparent;
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
      box-shadow: none;
      color: rgba(255, 244, 236, 0.15);
      font-size: clamp(24px, 1.84vw, 30px);
      line-height: 1.8;
      letter-spacing: 0.05em;
      text-align: center;
      text-shadow: 0 0 16px rgba(255, 233, 214, 0.038), 0 0 30px rgba(8, 8, 24, 0.16);
      filter: blur(0.45px);
      mix-blend-mode: screen;
    }

    .ask-page-shell {
      position: relative;
      width: min(100%, 1240px);
      height: min(90vh, 920px);
      display: grid;
      grid-template-columns: minmax(280px, 0.9fr) minmax(0, 1.3fr);
      gap: 20px;
      padding: 24px;
      border-radius: 36px;
      overflow: hidden;
    }

    .ask-side-panel,
    .ask-chat-panel {
      position: relative;
      min-height: 0;
      border-radius: 30px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.05));
      overflow: hidden;
    }

    .ask-side-panel {
      padding: 26px 22px;
    }

    .ask-hint-list {
      position: relative;
      z-index: 1;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    .ask-chip {
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(255, 255, 255, 0.08);
      color: rgba(255, 255, 255, 0.86);
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 13px;
      line-height: 1.4;
      transition: transform 0.2s ease, background 0.2s ease;
      cursor: pointer;
    }

    .ask-chip:hover {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, 0.14);
    }

    .ask-chat-panel {
      display: flex;
      flex-direction: column;
      padding: 22px;
    }

    .ask-messages {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding-right: 6px;
    }

    .ask-bubble {
      max-width: min(78%, 620px);
      padding: 14px 16px;
      border-radius: 22px;
      line-height: 1.8;
      white-space: pre-wrap;
      font-size: 15px;
    }

    .ask-bubble.user {
      align-self: flex-end;
      background: linear-gradient(135deg, rgba(255, 191, 210, 0.86), rgba(214, 180, 255, 0.84));
      color: #201635;
    }

    .ask-bubble.ai {
      align-self: flex-start;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.12);
      color: rgba(255, 255, 255, 0.9);
    }

    .ask-form {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      margin-top: 18px;
    }

    .ask-input {
      width: 100%;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(10, 12, 32, 0.48);
      color: #fff;
      border-radius: 18px;
      padding: 14px 16px;
      outline: none;
    }

    .ask-input::placeholder {
      color: rgba(255, 255, 255, 0.42);
    }

    .ask-submit,
    .ask-nav-button {
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.12);
      color: rgba(255, 255, 255, 0.9);
      padding: 12px 18px;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .music-toggle {
      padding: 8px 12px;
      font-size: 12px;
      line-height: 1.2;
      letter-spacing: 0.04em;
      backdrop-filter: blur(10px);
    }

    .ask-submit:hover,
    .ask-nav-button:hover {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, 0.18);
    }

    @media (max-width: 1024px) {
      :root {
        --card-width: 160px;
        --card-height: 120px;
      }
    }

    @media (max-width: 768px) {
      .page {
        padding: 18px;
      }

      .welcome-cinematic {
        height: min(90vh, 860px);
        border-radius: 28px;
      }

      .welcome-content {
        padding: 18px;
      }

      .scene-wrap {
        width: 100%;
        height: 100%;
        perspective: 1600px;
      }

      .wish-card {
        width: min(55vw, 160px);
        height: min(25vh, 120px);
        margin-left: calc(min(55vw, 160px) / -2);
        margin-top: calc(min(25vh, 120px) / -2);
      }

      .ask-page-shell {
        grid-template-columns: 1fr;
        height: min(92vh, 980px);
        padding: 18px;
      }

      .floating-fragment {
        max-width: min(74vw, 300px);
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <div id="loader" aria-live="polite">
    <div class="loader-orb"></div>
    <div class="text-center">
      <p class="text-lg font-semibold tracking-[0.22em] text-white/90 uppercase">Loading Memories</p>
      <p class="mt-2 text-sm text-white/65">正在点亮属于19岁的星光</p>
    </div>
  </div>

  <div id="particles-js" aria-hidden="true"></div>
  <div class="ambient-layer" aria-hidden="true"></div>

  <main id="app" class="bg-aurora">
    <section id="welcomePage" class="page active">
      <button id="welcomeAudioToggle" class="ask-nav-button music-toggle absolute right-6 top-6 z-20" type="button">首页音乐：开</button>
      <div class="welcome-cinematic">
        <div class="welcome-hero-media"></div>
        <div class="welcome-hero-overlay"></div>
        <div class="welcome-hero-glow"></div>
        <div class="welcome-figure-focus"></div>
        <div id="welcomeParticleField" class="welcome-particle-field"></div>
        <div id="welcomeSparkles" class="welcome-sparkles"></div>
        <div id="welcomeShootingStars" class="welcome-shooting-stars"></div>

        <div class="welcome-content">
          <div class="welcome-copy">
            <p class="welcome-kicker text-sm uppercase tracking-[0.38em] text-white/62">Birthday Chapter 19</p>
            <h1 class="welcome-title mt-5 text-5xl font-extrabold leading-tight text-white drop-shadow-[0_12px_40px_rgba(10,8,30,0.45)] md:text-7xl">
              致最好的19岁
            </h1>
            <div class="hero-divider"></div>
            <p class="welcome-subtitle mx-auto mt-6 max-w-2xl text-base leading-8 text-white/82 md:text-xl">
              致我探索中的 19 岁，和一路同行的你们
            </p>

            <div class="welcome-cta mt-10">
              <button
                id="startButton"
                class="hero-button rounded-full px-8 py-4 text-base font-semibold text-slate-900 shadow-glow transition duration-300 hover:-translate-y-1 hover:scale-[1.02] active:scale-[0.98] md:px-10 md:py-5 md:text-lg"
                type="button"
              >
                开启我的19岁回忆
              </button>
            </div>

          </div>
        </div>
      </div>
    </section>

    <section id="memoryPage" class="page">
      <button id="memoryAudioToggle" class="ask-nav-button music-toggle absolute right-6 top-6 z-20" type="button">第二部分音乐：开</button>
      <div class="memory-page-backdrop"></div>
      <div class="memory-shell mx-auto text-center">
        <div class="memory-stage w-full px-5 py-10 md:px-12 md:py-12">
          <div class="memory-vignette"></div>
          <div id="memoryAirLayer" class="memory-air-layer"></div>
          <div class="memory-beam"></div>
          <div class="memory-time-line"></div>
          <div class="memory-meta mb-6 overflow-hidden rounded-full bg-transparent">
            <div id="memoryProgress" class="memory-progress"></div>
          </div>

          <div class="memory-panel px-4 py-8 md:px-10 md:py-10">
          <div
            id="memoryTextContainer"
            class="memory-meta mx-auto flex h-[56vh] w-full max-w-4xl items-center justify-center overflow-hidden px-1 md:h-[60vh]"
          ></div>
          </div>
        </div>
      </div>
    </section>

    <section id="wallPage" class="page">
      <button id="backToWelcomeFromWallButton" class="ask-nav-button absolute left-6 top-6 z-20" type="button">返回首页</button>
      <button id="wallAudioToggle" class="ask-nav-button music-toggle absolute right-6 top-6 z-20" type="button">第三部分音乐：开</button>
      <div class="wall-hero-media"></div>
      <div class="wall-hero-overlay"></div>
      <div class="wall-hero-glow"></div>
      <div id="wallParticleField" class="wall-particle-field"></div>
      <div id="wallSparkles" class="wall-sparkles"></div>
      <div class="wall-light-rays"></div>
      <div id="wallPageFragments" class="floating-fragments"></div>
      <div class="scene-wrap" id="sceneWrap">
        <div id="cardOrbit" class="card-orbit"></div>
      </div>
      <button id="openCardFormButton" class="ask-nav-button absolute right-6 top-20 z-20" type="button">
        在线填写卡片
      </button>
      <button id="enterAskButton" class="ask-nav-button absolute right-6 top-36 z-20" type="button">
        进入 Ask Me
      </button>
    </section>

    <section id="askPage" class="page">
      <button id="askAudioToggle" class="ask-nav-button music-toggle absolute right-6 top-6 z-20" type="button">Ask Me音乐：开</button>
      <div id="askPageFragments" class="floating-fragments"></div>
      <div class="ask-page-shell glass-panel shadow-card">
        <div class="ask-side-panel">
          <div class="relative z-10">
            <p class="text-xs uppercase tracking-[0.34em] text-white/42">Ask Me</p>
            <h2 class="mt-4 text-3xl font-bold text-white md:text-5xl">和我聊聊</h2>
            <div id="askHintList" class="ask-hint-list"></div>
          </div>
        </div>

        <div class="ask-chat-panel">
          <div class="flex items-center justify-between gap-4 pb-4">
            <div>
              <p class="text-sm uppercase tracking-[0.3em] text-white/42">Knowledge Chat</p>
            </div>
            <button id="backToWallButton" class="ask-nav-button" type="button">返回照片墙</button>
          </div>

          <div id="askMessages" class="ask-messages"></div>

          <form id="askForm" class="ask-form">
            <input
              id="askInput"
              class="ask-input"
              type="text"
              placeholder="比如：你怎么看待19岁？你最想记住什么？"
              autocomplete="off"
            />
            <button class="ask-submit" type="submit">发送</button>
          </form>
        </div>
      </div>
    </section>
  </main>

  <div id="wishModal" class="pointer-events-none fixed inset-0 z-40 hidden items-center justify-center px-4">
    <div id="modalBackdrop" class="modal-backdrop absolute inset-0"></div>
    <div class="relative z-10 w-full max-w-4xl">
      <div class="modal-panel glass-panel rounded-[32px] border border-white/15 p-5 shadow-card md:p-8">
        <div class="flex items-start justify-between gap-4">
          <div class="flex items-center gap-4">
            <div id="modalMonogram" class="wish-card-orb"></div>
            <div>
              <p id="modalName" class="text-2xl font-bold text-white md:text-3xl"></p>
              <p id="modalTag" class="mt-1 text-sm text-white/55"></p>
            </div>
          </div>

          <button
            id="closeModalButton"
            class="control-pill rounded-full px-4 py-2 text-sm text-white/80 transition hover:bg-white/15"
            type="button"
          >
            关闭
          </button>
        </div>

        <div class="mt-6 grid gap-6 md:grid-cols-[1fr,0.7fr]">
          <div class="rounded-[24px] border border-white/10 bg-white/5 p-5">
            <p class="text-sm uppercase tracking-[0.28em] text-white/45">My Reply</p>
            <div id="modalMessage" class="mt-4 whitespace-pre-line text-base leading-8 text-white/84 md:text-lg"></div>
          </div>

          <div class="rounded-[24px] border border-white/10 bg-white/5 p-5">
            <p class="text-sm uppercase tracking-[0.28em] text-white/45">Her Wish</p>
            <div id="modalPreviewCard" class="relative mt-4 overflow-hidden rounded-[24px] border border-white/10 p-6">
              <div class="wish-card-sheen"></div>
              <div class="relative z-10">
                <div id="modalPreviewAccent" class="mb-5 inline-flex rounded-full px-3 py-1 text-xs text-white/68 card-badge"></div>
                <p id="modalPreviewShort" class="text-xl font-semibold leading-9 text-white/90"></p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="cardFormModal" class="pointer-events-none fixed inset-0 z-40 hidden items-center justify-center px-4">
    <div id="cardFormBackdrop" class="modal-backdrop absolute inset-0"></div>
    <div class="relative z-10 w-full max-w-2xl">
      <div class="modal-panel glass-panel rounded-[32px] border border-white/15 p-5 shadow-card md:p-8">
        <div class="flex items-start justify-between gap-4">
          <div>
            <p class="text-sm uppercase tracking-[0.3em] text-white/42">Online Card</p>
            <h3 class="mt-3 text-2xl font-bold text-white md:text-3xl">在线填写卡片</h3>
            <p class="mt-3 text-sm leading-7 text-white/68 md:text-base">会优先填补空位置；如果 80 个位置都满了，就自动新增卡片并重新排布。</p>
          </div>
          <button
            id="closeCardFormButton"
            class="control-pill rounded-full px-4 py-2 text-sm text-white/80 transition hover:bg-white/15"
            type="button"
          >
            关闭
          </button>
        </div>

        <form id="cardForm" class="mt-6 space-y-4">
          <div class="grid gap-4 md:grid-cols-2">
            <label class="block">
              <span class="mb-2 block text-sm text-white/72">名字</span>
              <input id="cardFormName" class="ask-input" type="text" maxlength="20" placeholder="填写名字" required />
            </label>
            <label class="block">
              <span class="mb-2 block text-sm text-white/72">关系备注</span>
              <input id="cardFormTag" class="ask-input" type="text" maxlength="30" placeholder="比如：室友 / 同学 / 学姐" />
            </label>
          </div>

          <label class="block">
            <span class="mb-2 block text-sm text-white/72">卡片正面祝福</span>
            <textarea id="cardFormShortWish" class="ask-input min-h-[110px] resize-none py-4" maxlength="120" placeholder="这里写卡片正面直接看到的祝福" required></textarea>
          </label>

          <label class="block">
            <span class="mb-2 block text-sm text-white/72">点开后完整内容</span>

    function randomBetween(min, max) {
      return min + Math.random() * (max - min);
    }

    function shuffleItems(items) {
      const next = [...items];
      for (let i = next.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [next[i], next[j]] = [next[j], next[i]];
      }
      return next;
    }

    function nextRandomSnippet(kind) {
      if (kind === 'ask') {
        if (!askFragmentBag.length) {
          askFragmentBag = shuffleItems(ASK_FLOATING_SNIPPETS);
        }
        return askFragmentBag.shift();
      }

      if (!wallFragmentBag.length) {
        wallFragmentBag = shuffleItems(WALL_FLOATING_SNIPPETS);
      }
      return wallFragmentBag.shift();
    }

    function viewportPoint(percentLeft, percentTop) {
      return {
        x: (percentLeft / 100) * window.innerWidth,
        y: (percentTop / 100) * window.innerHeight
      };
    }

    function fragmentFootprint(percentLeft, percentTop, placement = 'wall', dimensions = null) {
      const width = dimensions?.width || (placement === 'wall'
        ? Math.min(window.innerWidth * 0.26, 360)
        : Math.min(window.innerWidth * 0.24, 340));
      const height = dimensions?.height || (placement === 'wall' ? 170 : 160);
      const point = viewportPoint(percentLeft, percentTop);

      return {
        left: point.x,
        top: point.y,
        right: point.x + width,
        bottom: point.y + height,
        width,
        height
      };
    }

    function isInCentralWallSafeZone(x, y) {
      const cx = window.innerWidth / 2;
      const cy = window.innerHeight / 2;
      const scale = Math.max(0.3, Math.min(rotationState.scale, rotationState.targetScale));
      const radiusX = Math.max(320, window.innerWidth * 0.24 + scale * 320);
      const radiusY = Math.max(260, window.innerHeight * 0.21 + scale * 260);
      const dx = (x - cx) / radiusX;
      const dy = (y - cy) / radiusY;
      return (dx * dx) + (dy * dy) < 1;
    }

    function fragmentTouchesWallSubject(percentLeft, percentTop, dimensions = null) {
      const box = fragmentFootprint(percentLeft, percentTop, 'wall', dimensions);
      const samplePoints = [
        { x: box.left, y: box.top },
        { x: box.right, y: box.top },
        { x: box.left, y: box.bottom },
        { x: box.right, y: box.bottom },
        { x: box.left + (box.width / 2), y: box.top + (box.height / 2) }
      ];

      return samplePoints.some((point) => isInCentralWallSafeZone(point.x, point.y));
    }

    function isInAskShellSafeZone(x, y) {
      const shellWidth = Math.min(window.innerWidth - 48, 1240);
      const shellHeight = Math.min(window.innerHeight * 0.9, 920);
      const shellLeft = (window.innerWidth - shellWidth) / 2;
      const shellTop = (window.innerHeight - shellHeight) / 2;
      const padding = 96;

      return (
        x >= shellLeft - padding &&
        x <= shellLeft + shellWidth + padding &&
        y >= shellTop - padding &&
        y <= shellTop + shellHeight + padding
      );
    }

    function fragmentTouchesAskShell(percentLeft, percentTop, dimensions = null) {
      const box = fragmentFootprint(percentLeft, percentTop, 'ask', dimensions);
      const samplePoints = [
        { x: box.left, y: box.top },
        { x: box.right, y: box.top },
        { x: box.left, y: box.bottom },
        { x: box.right, y: box.bottom },
        { x: box.left + (box.width / 2), y: box.top + (box.height / 2) }
      ];

      return samplePoints.some((point) => isInAskShellSafeZone(point.x, point.y));
    }

    function buildFragmentZones(dimensions, placement = 'wall') {
      const viewportWidth = window.innerWidth;
      const viewportHeight = window.innerHeight;
      const edgePadding = 18;
      const width = Math.min(dimensions.width, viewportWidth - (edgePadding * 2));
      const height = Math.min(dimensions.height, viewportHeight - (edgePadding * 2));
      const topBand = placement === 'wall' ? 110 : 120;
      const bottomBand = placement === 'wall' ? 110 : 96;
      const sideBand = placement === 'wall' ? Math.max(120, viewportWidth * 0.16) : Math.max(130, viewportWidth * 0.17);
      const rightInset = placement === 'wall' ? 26 : 18;

      const zones = [
        {
          leftMin: edgePadding,
          leftMax: Math.max(edgePadding, sideBand - width),
          topMin: edgePadding,
          topMax: Math.max(edgePadding, viewportHeight - height - edgePadding)
        },
        {
          leftMin: Math.max(edgePadding, viewportWidth - sideBand),
          leftMax: Math.max(edgePadding, viewportWidth - width - rightInset),
          topMin: edgePadding,
          topMax: Math.max(edgePadding, viewportHeight - height - edgePadding)
        },
        {
          leftMin: edgePadding,
          leftMax: Math.max(edgePadding, viewportWidth - width - edgePadding),
          topMin: edgePadding,
          topMax: Math.max(edgePadding, topBand - height)
        },
        {
          leftMin: edgePadding,
          leftMax: Math.max(edgePadding, viewportWidth - width - edgePadding),
          topMin: Math.max(edgePadding, viewportHeight - bottomBand),
          topMax: Math.max(edgePadding, viewportHeight - height - edgePadding)
        }
      ];

      return zones.filter((zone) => zone.leftMax >= zone.leftMin && zone.topMax >= zone.topMin);
    }

    function positionToPercent(leftPx, topPx) {
      return {
        left: (leftPx / window.innerWidth) * 100,
        top: (topPx / window.innerHeight) * 100
      };
    }

    function pickFragmentPosition(dimensions, placement = 'wall') {
      const zones = buildFragmentZones(dimensions, placement);
      const touchesSubject = placement === 'wall' ? fragmentTouchesWallSubject : fragmentTouchesAskShell;

      for (let attempt = 0; attempt < 90; attempt += 1) {
        const zone = zones[Math.floor(Math.random() * zones.length)];
        if (!zone) break;
        const leftPx = randomBetween(zone.leftMin, zone.leftMax);
        const topPx = randomBetween(zone.topMin, zone.topMax);
        const candidate = positionToPercent(leftPx, topPx);
        if (!touchesSubject(candidate.left, candidate.top, dimensions)) {
          return candidate;
        }
      }

      const fallbackZone = zones[0] || {
        leftMin: 18,
        leftMax: 18,
        topMin: 18,
        topMax: 18
      };
      return positionToPercent(fallbackZone.leftMin, fallbackZone.topMin);
    }

    function spawnFloatingFragment(layer, snippet, placement = 'default') {
      if (!layer || !snippet) return;

      const fragment = document.createElement('div');
      fragment.className = `floating-fragment${placement === 'wall' ? ' wall-fragment' : ''}`;
      fragment.textContent = snippet;

      fragment.style.left = '-9999px';
      fragment.style.top = '-9999px';
      fragment.style.opacity = '0';
      layer.appendChild(fragment);

      const dimensions = {
        width: Math.ceil(fragment.offsetWidth),
        height: Math.ceil(fragment.offsetHeight)
      };

      let left = randomBetween(8, 68);
      let top = randomBetween(10, 72);

      if (placement === 'wall') {
        left = randomBetween(34, 48);
        top = randomBetween(42, 52);
      } else if (placement === 'ask') {
        ({ left, top } = pickFragmentPosition(dimensions, placement));
      }

      fragment.style.left = `${left}%`;
      fragment.style.top = `${top}%`;
      fragment.style.transform = placement === 'wall'
        ? `translate3d(-50%, 6px, 0) scale(${randomBetween(0.99, 1.01)})`
        : `translate3d(0, 18px, 0) scale(${randomBetween(0.94, 1.04)})`;

      gsap.timeline({
        onComplete: () => fragment.remove()
      })
        .to(fragment, {
          opacity: placement === 'wall' ? randomBetween(0.16, 0.22) : 1,
          y: 0,
          duration: placement === 'wall' ? 2.4 : 0.6,
          ease: 'power2.out'
        })
        .to(fragment, {
          opacity: 0,
          y: placement === 'wall' ? -4 : -16,
          duration: placement === 'wall' ? 3.2 : 0.85,
          delay: placement === 'wall' ? randomBetween(10.5, 13.5) : randomBetween(2.2, 3.6),
          ease: 'power2.in'
        });
    }

    function wallFragmentsShouldShow() {

    function updateWallAudioMood(isFragmentMode) {
      if (!wallAudio || !audioSettings.wallEnabled) return;
      const targetVolume = isFragmentMode ? WALL_AUDIO_FRAGMENT_VOLUME : WALL_AUDIO_BASE_VOLUME;
      gsap.to(wallAudio, {

        duration: 1.4,
        ease: 'sine.inOut',
        overwrite: 'auto'
      });

    function updateWallFragmentVisibility() {
      const shouldShow = wallFragmentsShouldShow();
      updateWallAudioMood(shouldShow);

      if (shouldShow) {
        if (!wallFragmentTimer) {
          startWallFragments();
        }
      } else {
        stopWallFragments();
      }
    }

    function startWallFragments() {
      stopWallFragments();
      if (!wallFragmentsShouldShow()) return;

      wallFragmentTimer = window.setTimeout(() => {
        if (!wallFragmentsShouldShow() || wallFragmentShownForCurrentZoom) return;
        wallFragmentShownForCurrentZoom = true;
        spawnFloatingFragment(wallFragments, nextRandomSnippet('wall'), 'wall');
      }, WALL_FRAGMENT_HOLD_DELAY);

    async function fetchAskReply(message) {
      const apiBase = window.location.protocol === 'file:' ? ASK_ME_API_BASE : '';
      const response = await fetch(`${apiBase}/api/ask`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          message,
          history: askConversationState.slice(-8)
        })
      });

      if (!response.ok) {
        const data = await response.json().catch(() => ({}));
        throw new Error(data?.error || 'ask request failed');
      }

      return response.json();
    }

    function setActivePage(targetPage) {
      Object.values(pages).forEach((page) => page.classList.remove('active'));
      pages[targetPage].classList.add('active');
      currentStage = targetPage;
    }

    function transitionTo(targetPage, onComplete) {
      const activePage = Object.values(pages).find((page) => page.classList.contains('active'));
      const nextPage = pages[targetPage];

      if (activePage === nextPage) {
        if (onComplete) onComplete();
        return;
      }

      gsap.timeline({
        defaults: { ease: 'power2.out' },
        onStart: () => {
          nextPage.style.visibility = 'visible';
          nextPage.style.pointerEvents = 'auto';
        },
        onComplete: () => {
          setActivePage(targetPage);
          if (onComplete) onComplete();
        }
      })
        .to(activePage, {
          opacity: 0,
          duration: 0.55,
          scale: 0.985,
          filter: 'blur(8px)'
        })
        .set(activePage, { visibility: 'hidden', pointerEvents: 'none', scale: 1, filter: 'blur(0px)' })
        .set(nextPage, { opacity: 0, scale: 1.02, filter: 'blur(10px)' })
        .to(nextPage, {
          opacity: 1,
          scale: 1,
          filter: 'blur(0px)',
          duration: 0.75
        }, '-=0.05');
    }

    function clearMemoryPlayback() {
      typingTimeouts.forEach(clearTimeout);
      typingTimeouts = [];
      clearTimeout(autoAdvanceTimeout);
      autoAdvanceTimeout = null;
      memoryPlaybackState.currentIndex = 0;
      memoryPlaybackState.wheelLockedUntil = 0;
      memoryPlaybackState.finaleShown = false;
      memoryStage?.classList.remove('memory-finale');
      memoryPanel?.classList.remove('memory-finale');
      memoryTextContainer.innerHTML = '';
      memoryLyricsScene = null;
      if (memoryProgress) memoryProgress.style.width = '0%';
      if (memoryCounter) memoryCounter.textContent = `01 / ${String(MEMORY_LINES.length).padStart(2, '0')}`;
    }

    function safePlayAudio(audio) {
      if (!audio) return;
      const playback = audio.play();
      if (playback && typeof playback.catch === 'function') {
        playback
          .then(() => {
            audioUnlocked = true;
            pendingAudioResume = false;
          })
          .catch(() => {
            pendingAudioResume = true;
          });
      }
    }

    function resumeAudioAfterGesture() {
      if (!pendingAudioResume) return;
      audioUnlocked = true;
      pendingAudioResume = false;
      syncAudioPlayback();
    }

    function updateAudioToggleLabels() {
      if (welcomeAudioToggle) {
        welcomeAudioToggle.textContent = `首页音乐：${audioSettings.introEnabled ? '开' : '关'}`;
      }
      if (memoryAudioToggle) {
        memoryAudioToggle.textContent = `第二部分音乐：${audioSettings.introEnabled ? '开' : '关'}`;
      }
      if (wallAudioToggle) {
        wallAudioToggle.textContent = `第三部分音乐：${audioSettings.wallEnabled ? '开' : '关'}`;
      }
      if (askAudioToggle) {
        askAudioToggle.textContent = `Ask Me音乐：${audioSettings.wallEnabled ? '开' : '关'}`;
      }
    }

    function syncAudioPlayback() {
      if (currentStage === 'welcome' || currentStage === 'memory') {
        if (audioSettings.introEnabled) {
          safePlayAudio(welcomeAudio);
        } else if (welcomeAudio) {
          welcomeAudio.pause();
        }
        if (wallAudio) {
          wallAudio.pause();
        }
        return;
      }

      if (currentStage === 'wall' || currentStage === 'ask') {
        if (audioSettings.wallEnabled) {
          safePlayAudio(wallAudio);
        } else if (wallAudio) {
          wallAudio.pause();
        }
        if (welcomeAudio) {
          welcomeAudio.pause();
        }
      }
    }

    function toggleIntroAudio() {
      audioSettings.introEnabled = !audioSettings.introEnabled;
      updateAudioToggleLabels();
      if (audioSettings.introEnabled) {
        if (welcomeAudio) {
          safePlayAudio(welcomeAudio);
        }
      } else if (welcomeAudio) {
        welcomeAudio.pause();
      }
    }

    function toggleWallAudio() {
      audioSettings.wallEnabled = !audioSettings.wallEnabled;
      updateAudioToggleLabels();
      if (audioSettings.wallEnabled) {
        if (wallAudio) {
          safePlayAudio(wallAudio);
        }
      } else if (wallAudio) {
        wallAudio.pause();
      }
    }

    function playWelcomeAudio() {
      if (!welcomeAudio) return;
      stopWallAudio();
      welcomeAudio.currentTime = 0;
      if (audioSettings.introEnabled) {
        safePlayAudio(welcomeAudio);
      }
    }

    function pauseWelcomeAudio(reset = false) {
      if (!welcomeAudio) return;
      welcomeAudio.pause();
      if (reset) {
        welcomeAudio.currentTime = 0;
      }
    }

    function playWallAudio() {
      if (!wallAudio) return;
      pauseWelcomeAudio(true);
      wallAudio.pause();
      wallAudio.currentTime = 0;
      wallAudio.volume = wallFragmentsShouldShow() ? WALL_AUDIO_FRAGMENT_VOLUME : WALL_AUDIO_BASE_VOLUME;
      if (audioSettings.wallEnabled) {
        safePlayAudio(wallAudio);
      }
    }

    function stopWallAudio(reset = true) {
      if (!wallAudio) return;
      wallAudio.pause();
      if (reset) {
        wallAudio.currentTime = 0;
      }
      wallAudio.volume = WALL_AUDIO_BASE_VOLUME;
    }

    function hideEndingOverlay() {

    function createMemoryLyricsScene(finale = false) {
      const scene = document.createElement('div');
      scene.className = `memory-lyrics-scene${finale ? ' memory-finale-active' : ''}`;

      const dustMarkup = `<div class="memory-dust-layer">${createMemoryDust(finale ? 96 : 18)}</div>`;

    function getMemoryLineVisual(offset) {
      const distance = Math.abs(offset);
      if (distance === 0) {
        return {
          y: 0,
          scale: 1.04,
          opacity: 1,
          blur: 0,
          color: 'rgba(255, 248, 242, 0.97)',
          fontWeight: 600,
          textShadow: '0 0 18px rgba(255, 236, 220, 0.16), 0 16px 44px rgba(10, 8, 24, 0.34)'
        };
      }

      if (distance === 1) {
        return {
          y: offset * 8,
          scale: 1,
          opacity: 0.66,
          blur: 1.4,
          color: 'rgba(255, 244, 237, 0.62)',
          fontWeight: 500,
          textShadow: '0 10px 26px rgba(8, 7, 19, 0.12)'
        };
      }

      if (distance === 2) {
        return {
          y: offset * 10,
          scale: 0.98,
          opacity: 0.46,
          blur: 2.4,
          color: 'rgba(255, 244, 237, 0.48)',
          fontWeight: 500,
          textShadow: '0 8px 20px rgba(8, 7, 19, 0.08)'
        };
      }

      if (distance === 3) {
        return {
          y: offset * 12,
          scale: 0.96,
          opacity: 0.32,
          blur: 3.2,
          color: 'rgba(255, 244, 237, 0.34)',
          fontWeight: 500,
          textShadow: '0 8px 18px rgba(8, 7, 19, 0.06)'
        };
      }

      if (distance === 4) {
        return {
          y: offset * 14,
          scale: 0.95,
          opacity: 0.24,
          blur: 4.2,
          color: 'rgba(255, 244, 237, 0.26)',
          fontWeight: 500,
          textShadow: '0 6px 16px rgba(8, 7, 19, 0.04)'
        };
      }

      if (distance <= MEMORY_CONFIG.visibleRadius) {
        return {
          y: offset * 16,
          scale: 0.94,
          opacity: 0.18,
          blur: 5.2,
          color: 'rgba(255, 244, 237, 0.2)',
          fontWeight: 500,
          textShadow: '0 4px 12px rgba(8, 7, 19, 0.03)'
        };
      }

      return {
        y: offset * 18,
        scale: 0.92,
        opacity: 0.12,
        blur: 6.4,
        color: 'rgba(255, 244, 237, 0.16)',
        fontWeight: 500,
        textShadow: '0 0 0 rgba(0, 0, 0, 0)'
      };
    }

    function applyMemoryLyricsState(scene, activeIndex, finale = false, immediate = false) {
      scene.classList.toggle('memory-finale-active', finale);
      const lines = scene.querySelectorAll('.memory-lyrics-line');
      lines.forEach((line) => {
        const index = Number(line.dataset.index || 0);
        const visual = getMemoryLineVisual(index - activeIndex);
        gsap.to(line, {
          y: visual.y,
          scale: visual.scale,
          opacity: visual.opacity,
          filter: `blur(${visual.blur}px)`,
          color: visual.color,
          fontWeight: visual.fontWeight,
          textShadow: visual.textShadow,
          duration: immediate ? 0 : (finale ? 0.8 : 0.55),
          ease: finale ? 'power2.out' : 'power3.out',
          overwrite: 'auto'
        });
      });

      const activeLine = scene.querySelector(`.memory-lyrics-line[data-index="${activeIndex}"]`);
      if (activeLine) {
        const targetTop = Math.max(
          0,
          activeLine.offsetTop - (scene.clientHeight / 2) + (activeLine.clientHeight / 2)
        );
        scene.scrollTo({
          top: targetTop,
          behavior: immediate ? 'auto' : 'smooth'
        });
      }
    }

    function stopWelcomeEasterEggTimer() {
      if (welcomeEasterEggTimer) {
        clearTimeout(welcomeEasterEggTimer);
        welcomeEasterEggTimer = null;
      }

    function morphWelcomeCopy(nextTitle, nextSubtitle) {
      if (!welcomeTitle || !welcomeSubtitle) return;

      gsap.timeline({ defaults: { ease: 'power2.inOut' } })
        .to([welcomeTitle, welcomeSubtitle], {
          opacity: 0,
          y: 10,
          filter: 'blur(8px)',
          duration: 0.7,
          stagger: 0.06
        })
        .add(() => {
          welcomeTitle.textContent = nextTitle;
          welcomeSubtitle.textContent = nextSubtitle;
        })
        .to([welcomeTitle, welcomeSubtitle], {
          opacity: 1,
          y: 0,
          filter: 'blur(0px)',
          duration: 0.9,
          stagger: 0.08
        });
    }

    function scheduleWelcomeEasterEgg() {
      stopWelcomeEasterEggTimer();
      if (currentStage !== 'welcome' || welcomeEasterEggActivated) return;

      welcomeEasterEggTimer = window.setTimeout(() => {
        if (currentStage !== 'welcome' || welcomeEasterEggActivated) return;
        welcomeEasterEggActivated = true;
        morphWelcomeCopy(WELCOME_TITLE_EASTER_EGG, WELCOME_SUBTITLE_EASTER_EGG);
      }, WELCOME_EASTER_EGG_DELAY);
    }

    function showMemoryLyricsFrame(activeIndex) {
      memoryPlaybackState.currentIndex = activeIndex;
      memoryPlaybackState.finaleShown = false;
      memoryStage?.classList.remove('memory-finale');
      memoryPanel?.classList.remove('memory-finale');
      if (!memoryLyricsScene) {
        memoryLyricsScene = createMemoryLyricsScene(false);
        memoryTextContainer.innerHTML = '';
        memoryTextContainer.appendChild(memoryLyricsScene);
        applyMemoryLyricsState(memoryLyricsScene, activeIndex, false, true);
      } else {
        applyMemoryLyricsState(memoryLyricsScene, activeIndex, false, false);
      }
      updateMemoryFocus(activeIndex);
    }

    function showMemoryEnding(activeIndex) {
      memoryPlaybackState.currentIndex = activeIndex;
      memoryPlaybackState.finaleShown = true;
      memoryStage?.classList.add('memory-finale');
      memoryPanel?.classList.add('memory-finale');
      if (!memoryLyricsScene) {
        memoryLyricsScene = createMemoryLyricsScene(true);
        memoryTextContainer.innerHTML = '';
        memoryTextContainer.appendChild(memoryLyricsScene);
      }
      const dustLayer = memoryLyricsScene.querySelector('.memory-dust-layer');
      if (dustLayer) {
        dustLayer.innerHTML = createMemoryDust(96);
      }
      updateMemoryFocus(activeIndex);
      applyMemoryLyricsState(memoryLyricsScene, activeIndex, true, false);
    }

    function scheduleMemoryAutoAdvance(delay = MEMORY_CONFIG.lineInterval) {
      clearTimeout(autoAdvanceTimeout);
      autoAdvanceTimeout = setTimeout(() => {
        if (currentStage !== 'memory') return;

        if (memoryPlaybackState.currentIndex >= MEMORY_LINES.length - 1) {
          if (memoryPlaybackState.finaleShown) {
            enterWall();
            return;
          }
          showMemoryEnding(MEMORY_LINES.length - 1);
          scheduleMemoryAutoAdvance(MEMORY_CONFIG.endingDuration * 1000);
          return;
        }

        const nextIndex = Math.min(MEMORY_LINES.length - 1, memoryPlaybackState.currentIndex + 1);
        if (nextIndex >= MEMORY_LINES.length - 1) {
          showMemoryEnding(MEMORY_LINES.length - 1);
          scheduleMemoryAutoAdvance(MEMORY_CONFIG.endingDuration * 1000);
          return;
        }

        showMemoryLyricsFrame(nextIndex);
        scheduleMemoryAutoAdvance(MEMORY_CONFIG.lineInterval);
      }, delay);
    }

    function playMemorySequence() {
      clearMemoryPlayback();
      showMemoryLyricsFrame(0);
      scheduleMemoryAutoAdvance(MEMORY_CONFIG.lineInterval);
    }

    function accelerateMemorySequence(event) {
      if (currentStage !== 'memory') return;
      event.preventDefault();

      const now = Date.now();
      if (now < memoryPlaybackState.wheelLockedUntil) return;
      memoryPlaybackState.wheelLockedUntil = now + 240;

      typingTimeouts.forEach(clearTimeout);
      typingTimeouts = [];
      clearTimeout(autoAdvanceTimeout);
      autoAdvanceTimeout = null;

      const direction = event.deltaY > 0 ? 1 : -1;
      const step = Math.abs(event.deltaY) > 80 ? 2 : 1;
      const nextIndex = Math.max(
        0,
        Math.min(MEMORY_LINES.length - 1, memoryPlaybackState.currentIndex + (direction * step))
      );

      if (direction > 0 && memoryPlaybackState.currentIndex >= MEMORY_LINES.length - 1) {
        if (memoryPlaybackState.finaleShown) {
          enterWall();
          return;
        }
        showMemoryEnding(MEMORY_LINES.length - 1);
        scheduleMemoryAutoAdvance(MEMORY_CONFIG.endingDuration * 1000);
        return;
      }

      if (nextIndex >= MEMORY_LINES.length - 1 && direction > 0) {
        showMemoryEnding(MEMORY_LINES.length - 1);
        scheduleMemoryAutoAdvance(MEMORY_CONFIG.endingDuration * 1000);
        return;
      }

      showMemoryLyricsFrame(nextIndex);
      scheduleMemoryAutoAdvance(MEMORY_CONFIG.lineInterval);
    }

    function enterMemory() {
      stopWelcomeEasterEggTimer();
      hideEndingOverlay();
      stopWallAudio();
      safePlayAudio(welcomeAudio);
      transitionTo('memory', () => {
        playMemorySequence();
      });
    }

    function enterWall() {
      clearMemoryPlayback();
      hideEndingOverlay();
      transitionTo('wall', () => {
        playWallAudio();
        updateWallFragmentVisibility();
      });
    }

    function returnToWelcome() {
      clearMemoryPlayback();
      hideEndingOverlay();
      stopWallAudio();
      stopWallFragments();
      stopAskFragments();
      playWelcomeAudio();
      transitionTo('welcome', () => {
        scheduleWelcomeEasterEgg();
      });
    }

    function enterAskPage() {
      hideEndingOverlay();
      transitionTo('ask', () => {
        stopWallFragments();
        startAskFragments();
        askInput.focus();
      });

    function returnToWallFromAsk() {
